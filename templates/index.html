<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Flask App</title>
  </head>
  <body class="bg-gray-50">
  <div class="container mx-auto py-10 px-4">
    <h1 class="text-3xl md:text-5xl font-extrabold text-center text-gray-800 mb-10">
      Job Application Form
    </h1>

    <form
      class="max-w-[650px] mx-auto bg-white border border-gray-200 p-10 rounded-2xl shadow-lg"
      method="POST"
    >
      <fieldset class="flex flex-col gap-6">
        <legend class="text-lg font-semibold text-green-700 bg-green-50 px-3 py-1 rounded-md w-fit mb-4">
          Employee Details
        </legend>

        <!-- First Name -->
        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium text-gray-700" for="name">
            First Name
          </label>
          <input
            type="text"
            id="name"
            name="first_name"
            class="border border-gray-300 px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-green-400 transition"
            placeholder="Enter first name"
            required
          />
        </div>

        <!-- Last Name -->
        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium text-gray-700" for="last_name">
            Last Name
          </label>
          <input
            type="text"
            id="last_name"
            name="last_name"
            class="border border-gray-300 px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-green-400 transition"
            placeholder="Enter last name"
            required
          />
        </div>

        <!-- Email -->
        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium text-gray-700" for="email">
            Email Address
          </label>
          <input
            type="email"
            id="email"
            name="email"
            class="border border-gray-300 px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-green-400 transition"
            placeholder="example@email.com"
            required
          />
        </div>

        <!-- Date -->
        <div class="flex flex-col gap-2">
          <label class="text-sm font-medium text-gray-700" for="date">
            Available Start Date
          </label>
          <input
            type="date"
            id="date"
            name="date"
            class="border border-gray-300 px-4 py-2 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-400 focus:border-green-400 transition"
            required
          />
        </div>

        <!-- Radio Buttons -->
        <div class="flex flex-col gap-3">
          <label class="text-sm font-semibold text-gray-800">
            Current Occupation
          </label>

          <div class="grid grid-cols-2 gap-4">

            <!-- Radio Option -->
            <label class="flex items-center gap-3 cursor-pointer group">
              <input
                type="radio"
                name="occupation"
                value="employed"
                class="hidden peer"
                required
              />
              <div
                class="w-5 h-5 rounded-full border-2 border-gray-400 flex items-center justify-center peer-checked:border-green-500 peer-checked:bg-green-500 transition"
              >
                <div
                  class="w-2.5 h-2.5 bg-white rounded-full hidden peer-checked:block"
                ></div>
              </div>
              <span class="text-gray-700 group-hover:text-green-600 transition">
                Employed
              </span>
            </label>

            <label class="flex items-center gap-3 cursor-pointer group">
              <input
                type="radio"
                name="occupation"
                value="unemployed"
                class="hidden peer"
                required
              />
              <div
                class="w-5 h-5 rounded-full border-2 border-gray-400 flex items-center justify-center peer-checked:border-green-500 peer-checked:bg-green-500 transition"
              >
                <div
                  class="w-2.5 h-2.5 bg-white rounded-full hidden peer-checked:block"
                ></div>
              </div>
              <span class="text-gray-700 group-hover:text-green-600 transition">
                Unemployed
              </span>
            </label>

            <label class="flex items-center gap-3 cursor-pointer group">
              <input
                type="radio"
                name="occupation"
                value="self-employed"
                class="hidden peer"
                required
              />
              <div
                class="w-5 h-5 rounded-full border-2 border-gray-400 flex items-center justify-center peer-checked:border-green-500 peer-checked:bg-green-500 transition"
              >
                <div
                  class="w-2.5 h-2.5 bg-white rounded-full hidden peer-checked:block"
                ></div>
              </div>
              <span class="text-gray-700 group-hover:text-green-600 transition">
                Self-Employed
              </span>
            </label>

            <label class="flex items-center gap-3 cursor-pointer group">
              <input
                type="radio"
                name="occupation"
                value="student"
                class="hidden peer"
                required
              />
              <div
                class="w-5 h-5 rounded-full border-2 border-gray-400 flex items-center justify-center peer-checked:border-green-500 peer-checked:bg-green-500 transition"
              >
                <div
                  class="w-2.5 h-2.5 bg-white rounded-full hidden peer-checked:block"
                ></div>
              </div>
              <span class="text-gray-700 group-hover:text-green-600 transition">
                Student
              </span>
            </label>

          </div>
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="mt-6 bg-green-600 text-white py-3 rounded-lg hover:bg-green-700 transition font-semibold shadow-md"
        >
          Submit Application
        </button>
      </fieldset>
    </form>
  </div>
</body>
</html>
